<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACME XR-40 Rocket Sled Control</title>
  <link rel="stylesheet" href="styles.css?v=6" />
</head>
<body>

  <div class="stage">
    <div class="stack">

      <div class="panel">

        <div class="header">
          <div class="acme">ACME</div>

          <div class="led-grid" id="ledGrid"></div>

          <div class="title">XR-40 ROCKET SLED CONTROL</div>
          <div class="status" id="statusText">STATUS: SAFE</div>

          <div class="substatus">
            <span id="presetLabel">PRESET: NONE</span>
          </div>
        </div>

        <div class="meters">

          <div class="meter">
            <div class="meter-top">
              <label for="waitSlider">WAIT</label>
              <div class="value"><span id="waitValue">250</span> ms</div>
            </div>
            <div class="vu">
              <div class="vu-track"></div>
              <div class="vu-fill" id="waitFill"></div>
              <input type="range" min="0" max="3000" value="250" id="waitSlider" />
            </div>
          </div>

          <div class="meter">
            <div class="meter-top">
              <label for="rampSlider">RAMP</label>
              <div class="value"><span id="rampValue">300</span> ms</div>
            </div>
            <div class="vu">
              <div class="vu-track"></div>
              <div class="vu-fill" id="rampFill"></div>
              <input type="range" min="0" max="2000" value="300" id="rampSlider" />
            </div>
          </div>

          <div class="meter">
            <div class="meter-top">
              <label for="outputSlider">OUTPUT</label>
              <div class="value"><span id="outputValue">85</span>%</div>
            </div>
            <div class="vu">
              <div class="vu-track"></div>
              <div class="vu-fill" id="outputFill"></div>
              <input type="range" min="0" max="100" value="85" id="outputSlider" />
            </div>
          </div>

          <div class="meter">
            <div class="meter-top">
              <label for="timeSlider">TIME</label>
              <div class="value"><span id="timeValue">2.5</span> s</div>
            </div>
            <div class="vu">
              <div class="vu-track"></div>
              <div class="vu-fill" id="timeFill"></div>
              <input type="range" min="0" max="10" step="0.1" value="2.5" id="timeSlider" />
            </div>
          </div>

        </div>

        <div class="actions">
          <button id="stopBtn" class="btn stop">ABORT</button>
          <button id="applyBtn" class="btn apply" disabled>APPLY</button>
          <button id="saveBtn" class="btn save">STORE</button>
        </div>

        <div class="presets">
          <button class="preset" data-slot="A">PRESET A</button>
          <button class="preset" data-slot="B">PRESET B</button>
          <button class="preset" data-slot="C">PRESET C</button>
        </div>

      </div>
    </div>
  </div>

  <script src="app.js?v=6"></script>
</body>
</html>
